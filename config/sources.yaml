sources:
  google_scholar:
    enabled: true
    from_exact:
      - scholaralerts-noreply@google.com

  ieee_author_alert:
    enabled: true
    from_exact:
      - no-reply@ieee.org
      - no-reply@xplore.ieee.org
    subject_patterns:
      - "IEEE Xplore Author Alert"
      - "Author Alert"
      - "New Content from"
      - "New Matches Available for Your Search"
    required_link_patterns:
      - "ieeexplore.ieee.org/document/"
